<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instafatih</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#fafafa;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  height:55px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  border-bottom:1px solid #dbdbdb;
  font-weight:bold;
}

.logo{
  font-size:20px;
}

.icon{
  font-size:22px;
  cursor:pointer;
}

/* PAGE */
.page{
  display:none;
  margin-top:55px;
  padding-bottom:60px;
}

.active{
  display:block;
}

/* CHAT */
.chat-box{
  height:75vh;
  overflow-y:auto;
  padding:15px;
}

.msg{
  max-width:70%;
  padding:10px;
  border-radius:12px;
  margin-bottom:8px;
  word-wrap:break-word;
}

.me{
  background:#dcf8c6;
  margin-left:auto;
}

.other{
  background:white;
  margin-right:auto;
}

.input-area{
  position:fixed;
  bottom:60px;
  width:100%;
  background:white;
  padding:10px;
  display:flex;
  border-top:1px solid #ddd;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ddd;
}

button{
  margin-left:10px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#0095f6;
  color:white;
  cursor:pointer;
}

/* BOTTOM NAV */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  height:55px;
  background:white;
  border-top:1px solid #dbdbdb;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.bottom div{
  font-size:22px;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">instafatih</div>
  <div class="icon" onclick="show('chat')">✉️</div>
</div>

<!-- CHAT PAGE -->
<div id="chat" class="page active">

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Mesaj yaz...">
    <button onclick="sendMsg()">Gönder</button>
  </div>

</div>

<!-- BOTTOM -->
<div class="bottom">
  <div>🏠</div>
  <div>🔍</div>
  <div onclick="show('chat')">✉️</div>
  <div>❤️</div>
  <div>👤</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "BURAYA",
  authDomain: "BURAYA",
  projectId: "BURAYA"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let userID = "";

auth.signInAnonymously().then(user=>{
  userID = user.user.uid;
});

/* MESAJ GÖNDER */
function sendMsg(){
  const text = document.getElementById("msgInput").value;
  if(text.trim() === "") return;

  db.collection("messages").add({
    text:text,
    sender:userID,
    time:Date.now()
  });

  document.getElementById("msgInput").value="";
}

/* MESAJLARI ÇEK */
db.collection("messages")
.orderBy("time")
.onSnapshot(snapshot=>{
  const box = document.getElementById("chatBox");
  box.innerHTML="";

  snapshot.forEach(doc=>{
    const data = doc.data();
    const div = document.createElement("div");
    div.classList.add("msg");

    if(data.sender === userID){
      div.classList.add("me");
    }else{
      div.classList.add("other");
    }

    div.innerText = data.text;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});
</script>

</body>
</html>
